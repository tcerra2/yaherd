<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO Object Tracking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 0.95em; }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 640px;
            margin: 0 auto 30px;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        video, canvas {
            width: 100%;
            height: auto;
            display: block;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-start {
            background: #4CAF50;
            color: white;
        }
        .btn-start:hover:not(:disabled) {
            background: #45a049;
        }
        .btn-stop {
            background: #f44336;
            color: white;
        }
        .btn-stop:hover:not(:disabled) {
            background: #da190b;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            text-align: center;
        }
        .status.loading { background: #fff3cd; color: #856404; }
        .status.active { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.idle { background: #d1ecf1; color: #0c5460; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-label { font-size: 0.85em; color: #999; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: #333; margin-top: 5px; }
        .debug {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85em;
            max-height: 150px;
            overflow-y: auto;
            color: #333;
        }
        .debug-line { margin: 5px 0; }
        .error { color: #d32f2f; }
        .success { color: #388e3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 YOLO Object Tracking</h1>
        <p class="subtitle">Real-time tracking • 100% Client-Side Processing</p>
        
        <div class="status idle" id="status">
            Ready to start (loading model...)
        </div>
        
        <div class="video-container">
            <video id="video" playsinline autoplay muted></video>
            <canvas id="canvas"></canvas>
        </div>
        
        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startTracking()">▶ START</button>
            <button class="btn-stop" id="stopBtn" onclick="stopTracking()" disabled>⏹ STOP</button>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">FPS</div>
                <div class="stat-value" id="fps">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Objects</div>
                <div class="stat-value" id="detections">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Tracked IDs</div>
                <div class="stat-value" id="tracked">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Time (ms)</div>
                <div class="stat-value" id="processTime">0</div>
            </div>
        </div>

        <div class="debug" id="debug"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let model = null;
        let isTracking = false;
        let frameCount = 0;
        let fps = 0;
        let lastFpsTime = performance.now();
        let trackedObjects = new Map();
        let nextTrackId = 0;

        function log(message, type = 'info') {
            console.log(message);
            const debugEl = document.getElementById('debug');
            const line = document.createElement('div');
            line.className = `debug-line ${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugEl.appendChild(line);
            debugEl.scrollTop = debugEl.scrollHeight;
        }

        function updateStatus(message, type = 'idle') {
            document.getElementById('status').textContent = message;
            document.getElementById('status').className = `status ${type}`;
        }

        async function loadModel() {
            log('Initializing COCO-SSD model...', 'info');
            updateStatus('Loading model...', 'loading');
            try {
                model = await cocoSsd.load();
                log('✓ Model loaded successfully', 'success');
                updateStatus('Ready! Click START to begin tracking', 'idle');
            } catch (err) {
                log(`✗ Model load error: ${err.message}`, 'error');
                updateStatus(`Error: ${err.message}`, 'error');
            }
        }

        async function startTracking() {
            if (!model) {
                log('✗ Model not loaded', 'error');
                updateStatus('Model not loaded. Wait 10 seconds...', 'error');
                return;
            }

            log('Starting tracking...', 'info');
            isTracking = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            updateStatus('🔴 TRACKING ACTIVE', 'active');
            trackedObjects.clear();
            nextTrackId = 0;

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                log('✓ Camera access granted', 'success');
                
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    log(`✓ Camera: ${video.videoWidth}x${video.videoHeight}`, 'success');
                    processFrame();
                };
            } catch (err) {
                log(`✗ Camera error: ${err.message}`, 'error');
                updateStatus(`Camera error: ${err.message}`, 'error');
                isTracking = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        }

        function updateTrack(detections) {
            const used = new Set();
            const newTracks = [];

            // Match existing tracks
            for (const [trackId, trackInfo] of trackedObjects) {
                let bestDist = 100;
                let bestIdx = -1;

                detections.forEach((det, idx) => {
                    if (used.has(idx)) return;
                    const cx = det.bbox[0] + det.bbox[2] / 2;
                    const cy = det.bbox[1] + det.bbox[3] / 2;
                    const dx = cx - trackInfo.cx;
                    const dy = cy - trackInfo.cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bestDist) {
                        bestDist = dist;
                        bestIdx = idx;
                    }
                });

                if (bestIdx >= 0 && bestDist < 80) {
                    used.add(bestIdx);
                    const det = detections[bestIdx];
                    trackedObjects.set(trackId, {
                        class: det.class,
                        score: det.score,
                        bbox: det.bbox,
                        cx: det.bbox[0] + det.bbox[2] / 2,
                        cy: det.bbox[1] + det.bbox[3] / 2
                    });
                    newTracks.push({ id: trackId, det });
                } else {
                    trackedObjects.delete(trackId);
                }
            }

            // Add new tracks
            detections.forEach((det, idx) => {
                if (!used.has(idx)) {
                    const id = nextTrackId++;
                    trackedObjects.set(id, {
                        class: det.class,
                        score: det.score,
                        bbox: det.bbox,
                        cx: det.bbox[0] + det.bbox[2] / 2,
                        cy: det.bbox[1] + det.bbox[3] / 2
                    });
                    newTracks.push({ id, det });
                }
            });

            return newTracks;
        }

        async function processFrame() {
            if (!isTracking) return;

            const startTime = performance.now();

            try {
                // Detect
                const predictions = await model.detect(video);
                const filtered = predictions.filter(p => p.score > 0.5);
                
                // Track
                const tracked = updateTrack(filtered);

                // Draw
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0);

                // Draw boxes
                tracked.forEach(t => {
                    const [x, y, w, h] = t.det.bbox;
                    
                    ctx.strokeStyle = '#00FF00';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, w, h);

                    ctx.fillStyle = '#00FF00';
                    ctx.font = 'bold 16px Arial';
                    ctx.fillText(`ID:${t.id}`, x, y - 10);

                    ctx.font = '12px Arial';
                    ctx.fillText(`${t.det.class}`, x, y + h + 20);
                });

                // Stats
                frameCount++;
                const now = performance.now();
                if (now - lastFpsTime >= 1000) {
                    fps = frameCount;
                    frameCount = 0;
                    lastFpsTime = now;
                }

                document.getElementById('fps').textContent = fps;
                document.getElementById('detections').textContent = filtered.length;
                document.getElementById('tracked').textContent = tracked.length;
                document.getElementById('processTime').textContent = Math.round(performance.now() - startTime);

            } catch (err) {
                log(`Detection error: ${err.message}`, 'error');
            }

            requestAnimationFrame(processFrame);
        }

        function stopTracking() {
            isTracking = false;
            log('Tracking stopped', 'info');
            updateStatus('Stopped', 'idle');

            if (video.srcObject) {
                video.srcObject.getTracks().forEach(t => t.stop());
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
        }

        // Initialize on load
        window.addEventListener('load', () => {
            log('App loaded. Initializing...', 'info');
            loadModel();
        });

        window.addEventListener('beforeunload', () => {
            stopTracking();
        });
    </script>
</body>
</html>
